<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        .login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;    
}
    .login-box {
    background: white;
    width: 100%;
    max-width: 380px;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    text-align: center;
}

.login-box h2 {
    color: #0d6efd;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    transition: 0.3s;
}

.login-box input:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
}

.login-box button {
    width: 100%;
    padding: 12px;
    background: #198754;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.3s;
}

.login-box button:hover {
    background: #157347;
    transform: scale(1.02);
}

.login-box p {
    margin-top: 12px;
    font-size: 13px;
    color: #666;
}
style>
    nav {
    background: #0d6efd;
    padding: 15px 0;
    color: white;
}
    </style>
</head>
<body>
    <nav></nav>
        <div class="nav-container">

    </nav>

  <!-- LOGIN UI -->
<div class="login-container">

    <div class="login-box">

        <!-- TITLE -->
        <h2>Welcome Back 👋</h2>
        <p>Login to access affordable housing listings</p>

        <!-- FORM -->
        <form id="loginForm">

            <label>Username</label>
            <input type="text" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" placeholder="Enter password" required>

            <!-- REMEMBER ME -->
            <div style="text-align:left; font-size:13px; margin-top:5px;">
                <input type="checkbox"> Remember me
            </div>

            <button type="submit">Login</button>

        </form>

        <!-- EXTRA LINKS -->
        <p style="margin-top:15px;">
            Forgot password? <a href="#">Reset</a>
        </p>

        <p>
            Don't have an account? <a href="#">Sign up</a>
        </p>

    </div>

</div>
